<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쇼핑 리스트</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
      min-height: 100vh;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 480px;
      padding: 32px 28px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #1a202c;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 24px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 0.95rem;
      color: #2d3748;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus { border-color: #667eea; }

    .input-row button {
      padding: 10px 18px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1.2rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .input-row button:hover { background: #5a67d8; }
    .input-row button:active { transform: scale(0.95); }

    .stats {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: #a0aec0;
      margin-bottom: 12px;
    }

    .stats span b { color: #4a5568; }

    ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: #f7fafc;
      border-radius: 10px;
      border: 1.5px solid #e2e8f0;
      transition: opacity 0.2s, background 0.2s;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    li.done {
      background: #f0fff4;
      border-color: #c6f6d5;
      opacity: 0.75;
    }

    li input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #48bb78;
      cursor: pointer;
      flex-shrink: 0;
    }

    li .item-text {
      flex: 1;
      font-size: 0.95rem;
      color: #2d3748;
      word-break: break-word;
      transition: text-decoration 0.2s, color 0.2s;
    }

    li.done .item-text {
      text-decoration: line-through;
      color: #a0aec0;
    }

    li .delete-btn {
      background: none;
      border: none;
      color: #cbd5e0;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
    }

    li .delete-btn:hover { color: #e53e3e; background: #fff5f5; }

    .empty {
      text-align: center;
      color: #cbd5e0;
      font-size: 0.9rem;
      padding: 32px 0;
    }

    .clear-btn {
      display: block;
      width: 100%;
      margin-top: 18px;
      padding: 9px;
      background: none;
      border: 1.5px solid #fed7d7;
      color: #e53e3e;
      border-radius: 10px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .clear-btn:hover { background: #fff5f5; }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .auth-form input {
      padding: 10px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 0.95rem;
      color: #2d3748;
      outline: none;
      transition: border-color 0.2s;
    }

    .auth-form input:focus { border-color: #667eea; }

    .auth-actions {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }

    .auth-actions button {
      flex: 1;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .auth-actions #loginBtn {
      background: #667eea;
      color: #fff;
      border: none;
    }

    .auth-actions #loginBtn:hover { background: #5a67d8; }

    .auth-actions #signupBtn {
      background: none;
      border: 1.5px solid #cbd5e0;
      color: #4a5568;
    }

    .auth-actions #signupBtn:hover { background: #f7fafc; }

    .auth-msg {
      font-size: 0.8rem;
      color: #e53e3e;
      min-height: 1em;
    }

    .user-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }

    .user-bar span {
      font-size: 0.8rem;
      color: #718096;
      word-break: break-all;
    }

    .user-bar button {
      flex-shrink: 0;
      padding: 6px 12px;
      background: none;
      border: 1.5px solid #e2e8f0;
      color: #4a5568;
      border-radius: 8px;
      font-size: 0.78rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .user-bar button:hover { background: #f7fafc; }
  </style>
</head>
<body>
<div class="card" id="authCard">
  <h1>🛒 쇼핑 리스트</h1>
  <p class="subtitle">로그인하고 나만의 리스트를 관리하세요</p>

  <div class="auth-form">
    <input id="authEmail" type="email" placeholder="이메일" autocomplete="email" />
    <input id="authPassword" type="password" placeholder="비밀번호 (6자 이상)" autocomplete="current-password" />
    <div class="auth-actions">
      <button id="loginBtn">로그인</button>
      <button id="signupBtn">회원가입</button>
    </div>
    <p id="authMsg" class="auth-msg"></p>
  </div>
</div>

<div class="card" id="appCard" style="display:none">
  <div class="user-bar">
    <span id="userEmail"></span>
    <button id="logoutBtn">로그아웃</button>
  </div>

  <h1>🛒 쇼핑 리스트</h1>
  <p class="subtitle">오늘 사야 할 것들을 적어보세요</p>

  <div class="input-row">
    <input id="itemInput" type="text" placeholder="아이템 추가..." maxlength="60" />
    <button id="addBtn" title="추가">＋</button>
  </div>

  <div class="stats">
    <span>전체 <b id="totalCount">0</b>개</span>
    <span>완료 <b id="doneCount">0</b>개</span>
  </div>

  <ul id="list"></ul>
  <p id="emptyMsg" class="empty">리스트가 비어 있습니다 ✨</p>

  <button class="clear-btn" id="clearBtn">완료 항목 모두 삭제</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://oobqmybshzdnlbogrxzq.supabase.co';
  const SUPABASE_KEY = 'sb_publishable__U3SKdWENZME2YmtgnhJhA_Xw6R2IBW';
  const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const authCard = document.getElementById('authCard');
  const appCard = document.getElementById('appCard');
  const authEmail = document.getElementById('authEmail');
  const authPassword = document.getElementById('authPassword');
  const authMsg = document.getElementById('authMsg');
  const loginBtn = document.getElementById('loginBtn');
  const signupBtn = document.getElementById('signupBtn');
  const logoutBtn = document.getElementById('logoutBtn');
  const userEmail = document.getElementById('userEmail');

  const input = document.getElementById('itemInput');
  const addBtn = document.getElementById('addBtn');
  const list = document.getElementById('list');
  const emptyMsg = document.getElementById('emptyMsg');
  const totalCount = document.getElementById('totalCount');
  const doneCount = document.getElementById('doneCount');
  const clearBtn = document.getElementById('clearBtn');

  let items = [];
  let currentUser = null;

  function setAuthMsg(text) {
    authMsg.textContent = text || '';
  }

  async function signUp() {
    const email = authEmail.value.trim();
    const password = authPassword.value;
    if (!email || !password) { setAuthMsg('이메일과 비밀번호를 입력해주세요.'); return; }
    setAuthMsg('');
    const { data, error } = await db.auth.signUp({ email, password });
    if (error) { setAuthMsg(error.message); return; }
    if (!data.session) {
      setAuthMsg('가입 확인 이메일을 보냈습니다. 이메일을 확인한 후 로그인해주세요.');
    }
  }

  async function signIn() {
    const email = authEmail.value.trim();
    const password = authPassword.value;
    if (!email || !password) { setAuthMsg('이메일과 비밀번호를 입력해주세요.'); return; }
    setAuthMsg('');
    const { error } = await db.auth.signInWithPassword({ email, password });
    if (error) { setAuthMsg(error.message); }
  }

  async function signOut() {
    await db.auth.signOut();
  }

  function showAuthedUI(user) {
    currentUser = user;
    authCard.style.display = 'none';
    appCard.style.display = 'block';
    userEmail.textContent = user.email;
    authEmail.value = '';
    authPassword.value = '';
    setAuthMsg('');
    loadItems();
  }

  function showLoggedOutUI() {
    currentUser = null;
    items = [];
    appCard.style.display = 'none';
    authCard.style.display = 'block';
  }

  db.auth.onAuthStateChange((_event, session) => {
    if (session && session.user) {
      showAuthedUI(session.user);
    } else {
      showLoggedOutUI();
    }
  });

  loginBtn.addEventListener('click', signIn);
  signupBtn.addEventListener('click', signUp);
  logoutBtn.addEventListener('click', signOut);
  authPassword.addEventListener('keydown', e => { if (e.key === 'Enter') signIn(); });

  async function loadItems() {
    const { data, error } = await db
      .from('shopping_items')
      .select('*')
      .order('created_at', { ascending: false });
    if (error) {
      console.error('Failed to load items:', error);
      return;
    }
    items = data;
    render();
  }

  function updateStats() {
    const done = items.filter(i => i.done).length;
    totalCount.textContent = items.length;
    doneCount.textContent = done;
    emptyMsg.style.display = items.length === 0 ? 'block' : 'none';
    clearBtn.style.display = done > 0 ? 'block' : 'none';
  }

  function render() {
    list.innerHTML = '';
    items.forEach(item => {
      const li = document.createElement('li');
      if (item.done) li.classList.add('done');

      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = item.done;
      cb.addEventListener('change', () => toggleItem(item.id, cb.checked));

      const span = document.createElement('span');
      span.className = 'item-text';
      span.textContent = item.text;

      const del = document.createElement('button');
      del.className = 'delete-btn';
      del.textContent = '✕';
      del.title = '삭제';
      del.addEventListener('click', () => deleteItem(item.id));

      li.append(cb, span, del);
      list.appendChild(li);
    });
    updateStats();
  }

  async function addItem() {
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    input.focus();

    const { data, error } = await db
      .from('shopping_items')
      .insert({ text, done: false, user_id: currentUser.id })
      .select()
      .single();
    if (error) {
      console.error('Failed to add item:', error);
      return;
    }
    items.unshift(data);
    render();
  }

  async function toggleItem(id, done) {
    const { error } = await db
      .from('shopping_items')
      .update({ done })
      .eq('id', id);
    if (error) {
      console.error('Failed to update item:', error);
      return;
    }
    const item = items.find(i => i.id === id);
    if (item) item.done = done;
    render();
  }

  async function deleteItem(id) {
    const { error } = await db
      .from('shopping_items')
      .delete()
      .eq('id', id);
    if (error) {
      console.error('Failed to delete item:', error);
      return;
    }
    items = items.filter(i => i.id !== id);
    render();
  }

  addBtn.addEventListener('click', addItem);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });

  clearBtn.addEventListener('click', async () => {
    const doneIds = items.filter(i => i.done).map(i => i.id);
    if (doneIds.length === 0) return;
    const { error } = await db
      .from('shopping_items')
      .delete()
      .in('id', doneIds);
    if (error) {
      console.error('Failed to clear done items:', error);
      return;
    }
    items = items.filter(i => !i.done);
    render();
  });
</script>
</body>
</html>
